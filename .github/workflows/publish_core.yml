name: 🚀 Publish @uverify/core to npm

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  publish:
    if: "github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'release-please--branches--main')"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: https://registry.npmjs.org
          cache: 'npm'
          cache-dependency-path: packages/core/package-lock.json

      - name: ⬆️ Ensure npm supports Trusted Publishing
        run: npm i -g npm@^11.5.1

      - name: 📦 Install Dependencies
        working-directory: ./packages/core
        run: npm ci

      - name: 🛠️ Build the Project
        working-directory: ./packages/core
        run: npm run build

      - name: 🚀 Publish to npm (OIDC only)
        working-directory: ./typescript
        env:
          NPM_CONFIG_USERCONFIG: /dev/null
        run: |
          unset NODE_AUTH_TOKEN NPM_TOKEN
          npm publish --provenance --access public

      - name: ✅ Verify Published Package
        run: npm info @uverify/core